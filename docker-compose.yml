version: '3.8'

services:
  go-gateway:
    build: .
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - OLLAMA_URL=http://ollama:11434
      - DEFAULT_MODEL=qwen3
      # - OPENAI_API_KEY=sk-...   # uncomment to enable OpenAI provider
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - /d/ollama-data:/root/.ollama
    restart: unless-stopped

